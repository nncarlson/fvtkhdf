name: fpm

on:
  push:
  pull_request:

jobs:
  build:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    name: fpm Build (${{ matrix.mode }})
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository }}/fvtkhdf-ci:latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: serial
            hdf5_pkg: libhdf5-dev
            hdf5_pc_pattern: '/pkgconfig/(hdf5|hdf5-serial)\.pc$'
            generator_args: --profile release
            build_args: --profile release
          - mode: mpi
            hdf5_pkg: libhdf5-openmpi-dev
            hdf5_pc_pattern: '/pkgconfig/(hdf5-openmpi|hdf5)\.pc$'
            generator_args: --features mpi-release
            build_args: --features mpi-release

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install pkg-config
      run: |
        apt-get update
        apt-get install -y pkg-config

    - name: Ensure fpm is available
      run: |
        if command -v fpm >/dev/null 2>&1; then
          fpm --version
          exit 0
        fi

        python3 - <<'PY'
        import os
        import shutil
        import urllib.request

        url = "https://github.com/fortran-lang/fpm/releases/download/v0.13.0/fpm-0.13.0-linux-x86_64-gcc-12"
        dst = os.path.join(os.environ["RUNNER_TEMP"], "fpm")
        with urllib.request.urlopen(url) as response, open(dst, "wb") as f:
            shutil.copyfileobj(response, f)
        if not os.path.isfile(dst):
            raise SystemExit(f"download failed: {dst} was not created")
        print(dst)
        PY
        chmod +x "$RUNNER_TEMP/fpm"
        echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
        "$RUNNER_TEMP/fpm" --version

    - name: Select HDF5 pkg-config metadata
      run: |
        pc_file="$(dpkg -L "${{ matrix.hdf5_pkg }}" | grep -E "${{ matrix.hdf5_pc_pattern }}" | head -n1)"
        test -n "$pc_file"
        echo "Using pkg-config file: $pc_file"
        mkdir -p "$RUNNER_TEMP/pkgconfig"
        pc_dir="$(dirname "$pc_file")"
        find "$pc_dir" -maxdepth 1 -name '*.pc' -exec ln -sf {} "$RUNNER_TEMP/pkgconfig/" \;
        ln -sf "$pc_file" "$RUNNER_TEMP/pkgconfig/hdf5.pc"
        echo "PKG_CONFIG_LIBDIR=$RUNNER_TEMP/pkgconfig" >> "$GITHUB_ENV"
        echo "PKG_CONFIG_PATH=" >> "$GITHUB_ENV"
        pkg-config --cflags --libs hdf5

    - name: Generate staged fpm sources
      run: |
        cd fpm
        ./generate_fpm_src.py ${{ matrix.generator_args }}

    - name: Build with fpm
      run: |
        cd fpm/fpm-src
        fpm build ${{ matrix.build_args }}
