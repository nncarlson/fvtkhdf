name = "fvtkhdf"
version = "0.5.1"
license = "BSD-2-Clause"
maintainer = "Neil Carlson"
author = "Neil Carlson"
description = "Modern Fortran library for writing VTKHDF files"

[build]
auto-executables = false
auto-examples = true
auto-tests = false
module-naming = false

[library]
source-dir = "src"

[dependencies]
hdf5 = "*"

[preprocess]
[preprocess.cpp]
suffixes = ["F90"]

[fortran]
implicit-typing = true
implicit-external = true
source-form = "free"

[features]
strict.gfortran.flags = "-fimplicit-none -ffree-line-length-none"
optimized.flags = "-O3"
optimized.preprocess.cpp.macros = ["NDEBUG"]
mpi-release.dependencies.mpi = "*"
mpi-release.flags = "-O3"
mpi-release.gfortran.flags = "-fimplicit-none -ffree-line-length-none"
mpi-release.preprocess.cpp.macros = ["USE_MPI", "NDEBUG"]

[profiles]
default = ["strict"]
release = ["optimized"]
